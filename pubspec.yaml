name: multazim
description: "تطبيق لبناء عادات يومية تدوم"
publish_to: 'none'
version: 1.0.0+1

environment:
  sdk: ^3.10.8

# ─────────────────────────────────────────────────
# RUNTIME DEPENDENCIES
# ─────────────────────────────────────────────────
dependencies:
  flutter:
    sdk: flutter
  flutter_localizations:
    sdk: flutter

  # Navigation
  go_router: ^17.1.0

  # State management
  flutter_bloc: ^9.1.1

  # Dependency injection
  get_it: ^9.2.1

  # Local database
  objectbox: ^5.2.0
  objectbox_flutter_libs: ^5.2.0

  # Backend
  supabase_flutter: ^2.12.0

  # Unique IDs
  uuid: ^4.5.2

  # Charts
  fl_chart: ^1.1.1

  # Date formatting
  intl: ^0.20.2

  # Connectivity
  connectivity_plus: ^7.0.0

  # Export
  csv: ^7.1.0
  excel: ^4.0.6
  share_plus: ^12.0.1

  # Environment
  flutter_dotenv: ^6.0.0

  # Utilities
  path: any
  path_provider: any
  equatable: any
  rxdart: ^0.28.0

  # UI
  shimmer: ^3.0.0
  flutter_animate: ^4.5.2
  confetti: ^0.8.0

  # Notifications
  flutter_local_notifications: ^21.0.0-dev.2
  timezone: ^0.11.0
  flutter_timezone: ^5.0.1

  # Icons
  cupertino_icons: ^1.0.8

# ─────────────────────────────────────────────────
# DEV-ONLY DEPENDENCIES (not included in release build)
# ─────────────────────────────────────────────────
dev_dependencies:
  flutter_test:
    sdk: flutter

  # Linting
  flutter_lints: ^6.0.0

  # App icon generation — only needed when regenerating icons
  flutter_launcher_icons: ^0.14.4

  # Splash screen generation — only needed when regenerating splash
  flutter_native_splash: ^2.4.4

  # ObjectBox code generation
  build_runner: ^2.11.0
  objectbox_generator: ^5.2.0

  # animate_do removed — functionality covered by flutter_animate

# ─────────────────────────────────────────────────
# LAUNCHER ICONS CONFIG
# ─────────────────────────────────────────────────
flutter_launcher_icons:
  android: true
  ios: true
  image_path: "assets/icon/app_icon.png"
  adaptive_icon_background: "#1E1B4B"
  adaptive_icon_foreground: "assets/icon/app_icon_foreground.png"

# ─────────────────────────────────────────────────
# SPLASH SCREEN CONFIG
# ─────────────────────────────────────────────────
flutter_native_splash:
  color: "#4F46E5"
  color_dark: "#1E1B4B"
  image: assets/icon/app_icon_foreground.png
  image_dark: assets/icon/app_icon_foreground.png
  android_12:
    image: assets/icon/app_icon_foreground.png
    icon_background_color: "#4F46E5"
    image_dark: assets/icon/app_icon_foreground.png
    icon_background_color_dark: "#1E1B4B"
  web: false
  fullscreen: false

# ─────────────────────────────────────────────────
# FLUTTER CONFIG
# ─────────────────────────────────────────────────
flutter:
  uses-material-design: true

  assets:
    - .env
    - assets/icon/app_icon_foreground.png

  fonts:
    - family: Cairo
      fonts:
        - asset: assets/fonts/Cairo-Regular.ttf
          weight: 400
        - asset: assets/fonts/Cairo-Medium.ttf
          weight: 500
        - asset: assets/fonts/Cairo-SemiBold.ttf
          weight: 600
        - asset: assets/fonts/Cairo-Bold.ttf
          weight: 700